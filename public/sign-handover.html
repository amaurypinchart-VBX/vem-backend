<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Handover — VIEWBOX</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0c10; color: #f0f2f5; min-height: 100vh; padding: 16px; -webkit-font-smoothing: antialiased; }
.container { max-width: 720px; margin: 0 auto; }
.brand { display: flex; align-items: center; gap: 12px; padding: 16px; background: #1a1d24; border-radius: 12px; margin-bottom: 16px; }
.brand-logo { width: 44px; height: 44px; background: #e63946; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; color: #fff; }
.brand-text { font-weight: 700; font-size: 18px; }
.brand-sub { font-size: 12px; color: #8892a4; }
.card { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 800; color: #e63946; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.info-row { display: flex; padding: 6px 0; border-bottom: 1px solid #22262f; font-size: 14px; }
.info-row:last-child { border-bottom: none; }
.info-label { color: #8892a4; min-width: 130px; }
.info-value { color: #f0f2f5; font-weight: 600; flex: 1; }
.zone { display: flex; align-items: center; gap: 10px; padding: 10px; background: #22262f; border-radius: 8px; margin-bottom: 6px; }
.zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.zone-name { flex: 1; font-size: 14px; font-weight: 600; }
.zone-comment { font-size: 12px; color: #8892a4; margin-top: 3px; }
.zone-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; color: #fff; }
.sig-existing { background: #fff; border-radius: 8px; padding: 10px; margin-top: 8px; }
.sig-existing img { width: 100%; max-height: 80px; object-fit: contain; display: block; }
.sig-name { font-size: 13px; color: #f0f2f5; margin-top: 6px; font-weight: 600; }
.input { width: 100%; padding: 12px 14px; background: #22262f; border: 1px solid #2a2f3a; border-radius: 8px; color: #f0f2f5; font-size: 15px; font-family: inherit; }
.input:focus { outline: none; border-color: #e63946; }
canvas { display: block; width: 100%; height: 200px; background: #fff; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px dashed #2a2f3a; }
.btn { padding: 14px 22px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: #e63946; color: #fff; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #8892a4; border: 1px solid #2a2f3a; }
.btn-row { display: flex; gap: 10px; margin-top: 12px; }
.btn-row .btn { flex: 1; }
.error-card { background: #fee2e2; color: #c0392b; padding: 24px; border-radius: 12px; text-align: center; }
.success-card { background: #dcfce7; color: #166534; padding: 28px; border-radius: 12px; text-align: center; }
.success-icon { font-size: 56px; margin-bottom: 12px; }
.success-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.loading { text-align: center; padding: 60px 20px; color: #8892a4; }
.loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #2a2f3a; border-top-color: #e63946; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.label-hint { font-size: 11px; color: #8892a4; margin-top: 6px; }
</style>
</head>
<body>
<div class="container" id="root">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Chargement du handover...</div>
  </div>
</div>

<script>
const API = '/api/v1';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const root = document.getElementById('root');

const STATUS_COLORS = { ok:'#2dc653', remark:'#f4a261', defect:'#e63946', pending:'#8892a4' };
const STATUS_LABELS = { ok:'OK', remark:'Remarque', defect:'Défaut', pending:'En attente' };

function esc(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fmtDate(d) { return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' }); }

async function loadHandover() {
  if (!token) {
    root.innerHTML = `<div class="error-card"><strong>Lien invalide.</strong><br>Aucun token de signature fourni.</div>`;
    return;
  }
  try {
    const r = await fetch(`${API}/public/handover-sign/${encodeURIComponent(token)}`);
    if (r.status === 410) {
      root.innerHTML = `<div class="error-card">
        <div style="font-size:48px;margin-bottom:10px;">⚠️</div>
        <strong>Ce lien a déjà été utilisé ou a expiré.</strong><br><br>
        Si vous devez signer un nouveau document, demandez un nouveau lien à votre interlocuteur VIEWBOX.
      </div>`;
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = (await r.json()).data;
    renderSignaturePage(data);
  } catch (e) {
    console.error('[sign]', e);
    root.innerHTML = `<div class="error-card">
      <strong>Erreur de chargement.</strong><br>
      Impossible de récupérer le document. Vérifiez votre connexion et réessayez.<br><br>
      <button class="btn btn-ghost" onclick="location.reload()">🔄 Réessayer</button>
    </div>`;
  }
}

function renderSignaturePage(h) {
  const zonesHTML = (h.items || []).map(z => {
    const color = STATUS_COLORS[z.status] || '#8892a4';
    const label = STATUS_LABELS[z.status] || z.status;
    return `<div class="zone">
      <div class="zone-dot" style="background:${color}"></div>
      <div style="flex:1;">
        <div class="zone-name">${esc(z.zoneName)}</div>
        ${z.comment ? `<div class="zone-comment">${esc(z.comment)}</div>` : ''}
      </div>
      <span class="zone-badge" style="background:${color}">${label}</span>
    </div>`;
  }).join('');

  root.innerHTML = `
    <div class="brand">
      <div class="brand-logo">V</div>
      <div>
        <div class="brand-text">VIEWBOX</div>
        <div class="brand-sub">Event Manager — Handover Certificate</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Informations Projet</div>
      <div class="info-row"><span class="info-label">Projet</span><span class="info-value">${esc(h.project.name)}</span></div>
      <div class="info-row"><span class="info-label">N° Interne</span><span class="info-value">${esc(h.project.internalNumber)}</span></div>
      <div class="info-row"><span class="info-label">Adresse</span><span class="info-value">${esc(h.project.address)}</span></div>
      <div class="info-row"><span class="info-label">Client</span><span class="info-value">${esc(h.clientName)}</span></div>
      <div class="info-row"><span class="info-label">Site Manager</span><span class="info-value">${esc(h.siteManagerName)}</span></div>
      <div class="info-row"><span class="info-label">Date</span><span class="info-value">${fmtDate(h.date)}</span></div>
    </div>

    ${h.scopeOfWork ? `<div class="card">
      <div class="card-title">📐 Étendue des travaux</div>
      <div style="font-size:14px;color:#f0f2f5;line-height:1.6;">${esc(h.scopeOfWork)}</div>
    </div>` : ''}

    ${zonesHTML ? `<div class="card">
      <div class="card-title">🔍 Zones inspectées (${h.items.length})</div>
      ${zonesHTML}
    </div>` : ''}

    ${h.generalNotes ? `<div class="card">
      <div class="card-title">📝 Remarques / Réservations</div>
      <div style="font-size:14px;color:#f0f2f5;line-height:1.6;">${esc(h.generalNotes)}</div>
    </div>` : ''}

    ${h.managerSignatureUrl ? `<div class="card">
      <div class="card-title">✍️ Signature Site Manager</div>
      <div class="sig-existing">
        <img src="${esc(h.managerSignatureUrl)}" alt="Signature site manager">
      </div>
      <div class="sig-name">${esc(h.siteManagerName)}</div>
    </div>` : ''}

    <div class="card">
      <div class="card-title">✏️ Votre signature</div>
      <div style="margin-bottom:14px;">
        <label style="font-size:12px;color:#8892a4;display:block;margin-bottom:6px;">Votre nom complet</label>
        <input type="text" class="input" id="signer-name" value="${esc(h.clientName)}" placeholder="Nom du signataire">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;color:#8892a4;display:block;margin-bottom:6px;">Signez ci-dessous avec votre doigt ou la souris</label>
        <canvas id="sig-canvas"></canvas>
        <div class="label-hint">En signant, vous confirmez avoir lu et approuvé le contenu de ce handover.</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="clearCanvas()">🗑️ Effacer</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitSignature()">✅ Valider la signature</button>
      </div>
    </div>
  `;
  initCanvas();
}

let ctx, canvas, drawing = false, hasDrawing = false;
function initCanvas() {
  canvas = document.getElementById('sig-canvas');
  // Sizing : ratio device pixel pour signature nette
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx = canvas.getContext('2d');
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#1a1d24';

  const pos = e => {
    const r = canvas.getBoundingClientRect();
    const ev = e.touches ? e.touches[0] : e;
    return { x: ev.clientX - r.left, y: ev.clientY - r.top };
  };

  const start = e => {
    e.preventDefault();
    drawing = true;
    hasDrawing = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  };
  const move = e => {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  };
  const end = () => { drawing = false; };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawing = false;
}

async function submitSignature() {
  if (!hasDrawing) { alert('Veuillez signer dans la zone prévue avant de valider.'); return; }
  const signerName = document.getElementById('signer-name').value.trim();
  if (!signerName) { alert('Veuillez saisir votre nom.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours...';

  const signatureBase64 = canvas.toDataURL('image/png');

  try {
    const r = await fetch(`${API}/public/handover-sign/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ signatureBase64, signerName }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || 'HTTP ' + r.status);
    }
    root.innerHTML = `<div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">Signature enregistrée !</div>
      <div>Merci. Une copie du document signé a été envoyée par email à l'équipe VIEWBOX et au client.</div>
      <div style="margin-top:20px;font-size:13px;opacity:0.7;">Vous pouvez fermer cette page.</div>
    </div>`;
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✅ Valider la signature';
    alert('Erreur : ' + e.message + '\n\nVérifiez votre connexion et réessayez.');
  }
}

loadHandover();
</script>
</body>
</html>
